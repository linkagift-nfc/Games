<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RetroTag NFC - Top Gear</title>


<style>

*{
box-sizing:border-box;
font-family:Arial, sans-serif;
}


body{

margin:0;
min-height:100vh;

display:flex;
align-items:center;
justify-content:center;

background:
linear-gradient(
#42c9ff,
#8bd34a
);

}



/* CARTUCHO */

.cartucho{

width:90%;
max-width:420px;

background:#f5f5f5;

padding:25px;

border-radius:22px;

border:8px solid #38a847;

box-shadow:
0 15px 35px rgba(0,0,0,.5);

text-align:center;

}



.logo img{

width:180px;

max-height:60px;

object-fit:contain;

}



h1{

font-size:26px;

margin:18px 0;

color:#d72626;

}



.capa{

width:80%;

border-radius:12px;

box-shadow:
0 8px 15px #555;

}



.estrelas{

font-size:24px;

color:#f5b400;

margin:15px;

}



.snes{

font-weight:bold;

color:#444;

}



button{

margin-top:25px;

width:90%;

padding:18px;


font-size:22px;

font-weight:bold;


border:none;

border-radius:12px;


background:#f5b400;

color:#222;


box-shadow:
0 8px 0 #a56d00;


cursor:pointer;

}



button:active{

transform:translateY(8px);

box-shadow:none;

}



.info{

margin-top:25px;

padding-top:15px;

border-top:2px solid #aaa;

color:#444;

line-height:1.8;

}





/* TELA DE CARREGAMENTO */


#loading{

display:none;

position:fixed;

top:0;

left:0;

width:100%;

height:100%;


background:#111;


color:white;


align-items:center;

justify-content:center;


text-align:center;


font-size:22px;


z-index:999;


}



.loading-box{

animation:pulse 1.5s infinite;

}



.barra{


margin-top:20px;

width:220px;

height:15px;


background:#333;


border-radius:20px;


overflow:hidden;


}



.progresso{


height:100%;

width:100%;


background:#f5b400;


animation:carregar 3s linear;


}



@keyframes carregar{


from{

width:0%;

}


to{

width:100%;

}


}



@keyframes pulse{


50%{

opacity:.5;

}


}



</style>


</head>



<body>



<div class="cartucho">



<div class="logo">

<img src="logo.png" alt="RetroTag NFC">

</div>




<h1>

🏎️ TOP GEAR

</h1>




<img 
class="capa"
src="topgear.webp"
>





<div class="estrelas">

★★★★★

</div>




<div class="snes">

SUPER NINTENDO<br>

1992

</div>





<button onclick="jogar()">

🟨 JOGAR AGORA

</button>





<div class="info">

📱 Compatível Android<br>

🍎 Compatível iPhone<br>

🎮 Controles na tela

</div>




</div>






<!-- CARREGAMENTO -->



<div id="loading">



<div class="loading-box">



<img src="logo.png" style="width:180px;">


<br><br>


INSERINDO CARTUCHO...


<br><br>


🏎️ TOP GEAR



<div class="barra">


<div class="progresso"></div>


</div>


<br>


CARREGANDO...



</div>


</div>







<script>


function jogar(){


document.getElementById("loading").style.display="flex";


setTimeout(function(){


window.location.href="emulador.html";


},3000);



}



</script>



</body>


</html>
