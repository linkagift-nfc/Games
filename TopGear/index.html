<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RetroTag NFC - Top Gear</title>


<style>

*{
box-sizing:border-box;
font-family:Arial, sans-serif;
}


body{

margin:0;
min-height:100vh;

display:flex;
align-items:center;
justify-content:center;

background:
linear-gradient(
#42c9ff,
#8bd34a
);

}



.cartucho{

width:90%;
max-width:420px;

background:#f5f5f5;

padding:25px;

border-radius:22px;

border:8px solid #38a847;

box-shadow:
0 15px 35px rgba(0,0,0,.5);

text-align:center;

}



.logo img{

width:180px;

max-height:60px;

object-fit:contain;

}



h1{

font-size:26px;

margin:18px 0;

color:#d72626;

}



.capa{

width:80%;

border-radius:12px;

box-shadow:
0 8px 15px #555;

}



.estrelas{

font-size:24px;

color:#f5b400;

margin:15px;

}



.snes{

font-weight:bold;

color:#444;

line-height:1.6;

}



button{

margin-top:25px;

width:90%;

padding:18px;

font-size:22px;

font-weight:bold;

border:none;

border-radius:12px;

background:#f5b400;

color:#222;

box-shadow:
0 8px 0 #a56d00;

cursor:pointer;

}



button:active{

transform:translateY(8px);

box-shadow:none;

}



.info{

margin-top:25px;

padding-top:15px;

border-top:2px solid #aaa;

color:#444;

line-height:1.8;

}



</style>

</head>


<body>


<div class="cartucho">


<div class="logo">

<img src="logo.png" alt="RetroTag NFC">

</div>



<h1>
🏎️ TOP GEAR
</h1>



<img 
class="capa"
src="capa.png"
>



<div class="estrelas">

★★★★★

</div>



<div class="snes">

SUPER NINTENDO<br>

1992

</div>



<button onclick="jogar()">

🟨 JOGAR AGORA

</button>



<div class="info">

📱 Compatível Android<br>

🍎 Compatível iPhone<br>

🎮 Controles na tela

</div>



</div>



<script>


function jogar(){


// pega automaticamente a pasta atual

let caminhoAtual = window.location.pathname;



caminhoAtual =
caminhoAtual.substring(
0,
caminhoAtual.lastIndexOf("/")
);



// nome da pasta

let pastaJogo =
caminhoAtual.split("/").pop();



// dados do jogo

let nomeJogo = "Top Gear";

let consoleJogo = "snes";

let arquivoRom = "top-gear.sfc";



// cria caminho ROM

let caminhoRom =
pastaJogo +
"/rom/" +
arquivoRom;



window.location.href =

"../emulador.html?core="
+
consoleJogo
+
"&nome="
+
encodeURIComponent(nomeJogo)
+
"&rom="
+
encodeURIComponent(caminhoRom);



}


</script>


</body>

</html>
