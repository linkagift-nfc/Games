<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RetroTag NFC</title>

<style>

*{
box-sizing:border-box;
font-family:Arial,sans-serif;
}


body{

margin:0;
min-height:100vh;

display:flex;
align-items:center;
justify-content:center;

background:
linear-gradient(
135deg,
#111,
#333
);

color:white;

}


.card{

width:90%;
max-width:420px;

background:#1b1b1b;

border-radius:20px;

padding:25px;

text-align:center;

box-shadow:
0 10px 30px rgba(0,0,0,.7);

}


.logo{

width:150px;

height:150px;

object-fit:cover;

border-radius:15px;

margin-bottom:15px;

border:3px solid #f5b400;

}


h1{

margin:10px 0;

font-size:28px;

}


button{

margin-top:20px;

width:100%;

padding:15px;

border:none;

border-radius:12px;

background:#f5b400;

font-size:18px;

font-weight:bold;

cursor:pointer;

}


button:hover{

background:#ffd45a;

}


#loading{

display:none;

position:fixed;

inset:0;

background:#000;

align-items:center;

justify-content:center;

flex-direction:column;

font-size:22px;

}


.spinner{

width:45px;

height:45px;

border:5px solid #444;

border-top:5px solid #f5b400;

border-radius:50%;

animation:girar 1s linear infinite;

margin-bottom:20px;

}


@keyframes girar{

100%{
transform:rotate(360deg);
}

}


</style>

</head>


<body>


<div class="card">


<img class="logo" src="capa.jpg">


<h1 id="nomeJogo">
Top Gear
</h1>


<p>
🎮 Sua cápsula digital NFC
</p>


<button onclick="jogar()">

▶ JOGAR AGORA

</button>


</div>



<div id="loading">

<div class="spinner"></div>

Carregando jogo...

</div>



<script>


//============================
// CONFIGURAÇÃO DO JOGO
// ALTERE SOMENTE ISSO
//============================


const jogo = {

nome:
"Top Gear",

core:
"snes",

rom:
"top-gear.sfc"


};



//============================
// DESCOBRE AUTOMATICAMENTE
// A PASTA ATUAL
//============================


function jogar(){


document
.getElementById("loading")
.style.display="flex";



let pasta =
window.location.pathname;



pasta =
pasta.substring(
0,
pasta.lastIndexOf("/")
);



let caminhoRom =
pasta.substring(1)
+
"/rom/"
+
jogo.rom;



setTimeout(function(){


window.location.href =

"../emulador.html?core="
+
jogo.core
+
"&nome="
+
encodeURIComponent(jogo.nome)
+
"&rom="
+
encodeURIComponent(caminhoRom);



},800);



}



</script>


</body>

</html>
