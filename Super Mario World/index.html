<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Super Mario World - RetroTag NFC</title>


<style>

html,body{

margin:0;
padding:0;

width:100%;
height:100%;

background:#000;

overflow:hidden;

font-family:Arial, sans-serif;

}


/* Área da logo */

#header{

height:55px;

background:#1b4fa3;

display:flex;

align-items:center;

justify-content:center;

}


/* Logo pequena */

#logo{

height:40px;

max-width:200px;

object-fit:contain;

}



/* Área do jogo */

#game{

width:100%;

height:calc(100% - 55px);

}



</style>


</head>


<body>


<div id="header">

<img id="logo" src="logo.png" alt="RetroTag NFC">

</div>



<div id="game"></div>



<script>


// Área do emulador

EJS_player = "#game";


// Console

EJS_core = "snes";


// Jogo

EJS_gameUrl = "rom/super-mario-world.smc";


// Nome

EJS_gameName = "Super Mario World";


// Arquivos EmulatorJS

EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";


// Inicia automaticamente

EJS_startOnLoaded = true;


// Configurações

EJS_threads = false;

EJS_gamePatch = false;

EJS_volume = 0.8;


// Controle virtual

EJS_VirtualGamepad = true;


// Fundo

EJS_color = "#000";


// Não abrir fullscreen automaticamente

EJS_fullscreenOnLoad = false;


</script>



<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>


</body>

</html>
