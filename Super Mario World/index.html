```html
<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Super Mario World</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:linear-gradient(180deg,#d8d8d8,#bdbdbd);

    font-family:Arial,Helvetica,sans-serif;

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    overflow:hidden;

}

.container{

    width:92%;
    max-width:420px;

    background:#efefef;

    border-radius:28px;

    padding:30px;

    text-align:center;

    border:4px solid #9c9c9c;

    box-shadow:0 18px 40px rgba(0,0,0,.35);

}

/* LOGO */

.logo{

    width:95px;

    margin-bottom:18px;

    filter:drop-shadow(0 4px 8px rgba(0,0,0,.25));

}

h1{

    color:#4d2ea0;

    font-size:34px;

    margin-bottom:20px;

}

.capa{

    width:100%;

    border-radius:18px;

    margin-bottom:20px;

    box-shadow:0 8px 20px rgba(0,0,0,.35);

}

.estrelas{

    font-size:24px;

    color:#FFD700;

    margin-bottom:25px;

}

.botao{

    width:100%;

    padding:18px;

    border:none;

    border-radius:16px;

    background:#6b33c4;

    color:white;

    font-size:22px;

    font-weight:bold;

    cursor:pointer;

    transition:.25s;

}

.botao:hover{

    background:#5520ad;

    transform:scale(1.03);

}

.info{

    margin-top:25px;

    color:#555;

    line-height:1.7;

    font-size:16px;

}

/* LOADING */

#loading{

    display:none;

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:#111;

    color:white;

    justify-content:center;

    align-items:center;

    flex-direction:column;

    z-index:9999;

}

.cartucho{

    font-size:50px;

    margin-bottom:20px;

    animation:flutuar 1s infinite;

}

.loading-logo{

    width:90px;

    margin-bottom:20px;

}

.loading-title{

    font-size:28px;

    font-weight:bold;

    margin-bottom:10px;

}

.loading-sub{

    font-size:18px;

    color:#cccccc;

    margin-bottom:35px;

}

.barra{

    width:280px;

    height:10px;

    background:#333;

    border-radius:20px;

    overflow:hidden;

}

.progresso{

    width:0;

    height:100%;

    background:#6b33c4;

    animation:carregar 2.2s linear forwards;

}

@keyframes carregar{

0%{width:0;}

100%{width:100%;}

}

@keyframes flutuar{

50%{

transform:translateY(-8px);

}

}

</style>

</head>

<body>

<div class="container">

<img src="logo.png" class="logo" alt="LINKA Gift">

<h1>SUPER MARIO WORLD</h1>

<img src="mario.webp" class="capa" alt="Super Mario World">

<div class="estrelas">

★★★★★

</div>

<button class="botao" onclick="iniciarJogo()">

▶ JOGAR AGORA

</button>

<div class="info">

📱 Compatível com Android e iPhone

<br><br>

🔄 Gire o celular para jogar

</div>

</div>


<div id="loading">

<img src="logo.png" class="loading-logo" alt="LINKA Gift">

<div class="cartucho">

🎮

</div>

<div class="loading-title">

SUPER MARIO WORLD

</div>

<div class="loading-sub">

Inserindo cartucho...

</div>

<div class="barra">

<div class="progresso"></div>

</div>

</div>

<script>

async function iniciarJogo(){

    document.getElementById("loading").style.display="flex";

    const tela=document.documentElement;

    try{

        if(tela.requestFullscreen){

            await tela.requestFullscreen();

        }else if(tela.webkitRequestFullscreen){

            tela.webkitRequestFullscreen();

        }

    }catch(e){}

    setTimeout(function(){

        window.location.href="emulador.html";

    },2200);

}

</script>

</body>

</html>
```
