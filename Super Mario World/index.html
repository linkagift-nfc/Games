```html
<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Super Mario World</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:linear-gradient(180deg,#d9d9d9,#bdbdbd);

font-family:Arial,Helvetica,sans-serif;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

}


.container{

width:92%;
max-width:420px;

background:#efefef;

border-radius:28px;

padding:30px;

text-align:center;

box-shadow:0 15px 40px rgba(0,0,0,.35);

border:4px solid #9b9b9b;

}


h1{

font-size:34px;

margin-bottom:20px;

color:#4b2d91;

}


.capa{

width:100%;

border-radius:18px;

margin-bottom:20px;

box-shadow:0 8px 20px rgba(0,0,0,.35);

}


.estrelas{

font-size:24px;

color:#FFD700;

margin-bottom:25px;

}


.botao{

width:100%;

padding:18px;

font-size:22px;

font-weight:bold;

background:#6d35c7;

color:#fff;

border:none;

border-radius:16px;

cursor:pointer;

transition:.25s;

}

.botao:hover{

background:#5422a8;

transform:scale(1.02);

}


.info{

margin-top:25px;

font-size:16px;

color:#555;

line-height:1.6;

}


#loading{

display:none;

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:#111;

color:#fff;

justify-content:center;
align-items:center;

flex-direction:column;

z-index:9999;

}


.cartucho{

font-size:42px;

margin-bottom:20px;

animation:flutuar 1s infinite;

}


.loading-text{

font-size:28px;

font-weight:bold;

margin-bottom:15px;

}


.sub{

font-size:18px;

color:#ccc;

margin-bottom:35px;

}


.barra{

width:280px;

height:10px;

background:#333;

border-radius:20px;

overflow:hidden;

}


.progresso{

height:100%;

width:0%;

background:#6d35c7;

animation:carregar 2.2s linear forwards;

}


@keyframes carregar{

0%{width:0%;}

100%{width:100%;}

}


@keyframes flutuar{

50%{

transform:translateY(-8px);

}

}

</style>

</head>

<body>


<div class="container">

<h1>SUPER MARIO WORLD</h1>

<img src="mario.webp" class="capa">

<div class="estrelas">
★★★★★
</div>

<button class="botao" onclick="iniciarJogo()">

▶ JOGAR AGORA

</button>

<div class="info">

📱 Compatível com Android e iPhone

<br><br>

🔄 Gire o celular para jogar

</div>

</div>



<div id="loading">

<div class="cartucho">

🎮

</div>

<div class="loading-text">

SUPER MARIO WORLD

</div>

<div class="sub">

Inserindo cartucho...

</div>

<div class="barra">

<div class="progresso"></div>

</div>

</div>



<script>

async function iniciarJogo(){

document.getElementById("loading").style.display="flex";

const el=document.documentElement;

try{

if(el.requestFullscreen){

await el.requestFullscreen();

}else if(el.webkitRequestFullscreen){

el.webkitRequestFullscreen();

}

}catch(e){}


setTimeout(function(){

window.location.href="emulador.html";

},2200);

}

</script>

</body>

</html>
```
