<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RetroTag NFC - Super Mario World</title>

<style>

*{
box-sizing:border-box;
font-family:Arial, sans-serif;
}


body{

margin:0;
min-height:100vh;

display:flex;
align-items:center;
justify-content:center;

background:
linear-gradient(
#42c9ff,
#8bd34a
);

}



.cartucho{

width:90%;
max-width:420px;

background:#f5f5f5;

padding:25px;

border-radius:22px;

border:8px solid #38a847;

box-shadow:
0 15px 35px rgba(0,0,0,.5);

text-align:center;

}



.logo{

font-size:20px;

font-weight:bold;

letter-spacing:4px;

color:#333;

}



h1{

font-size:26px;

margin:18px 0;

color:#d72626;

}



.capa{

width:80%;

border-radius:12px;

box-shadow:
0 8px 15px #555;

}



.estrelas{

font-size:24px;

color:#f5b400;

margin:15px;

}



.snes{

font-weight:bold;

color:#444;

}



button{

margin-top:25px;

width:90%;

padding:18px;


font-size:22px;

font-weight:bold;


border:none;

border-radius:12px;


background:#f5b400;

color:#222;


box-shadow:
0 8px 0 #a56d00;


cursor:pointer;

}



button:active{

transform:translateY(8px);

box-shadow:none;

}



.info{

margin-top:25px;

padding-top:15px;

border-top:2px solid #aaa;

color:#444;

line-height:1.8;

}


</style>

</head>


<body>


<div class="cartucho">


<div class="logo">
RETROTAG NFC
</div>


<h1>
🍄 SUPER MARIO WORLD
</h1>


<img 
class="capa"
src="mario.webp"
>


<div class="estrelas">
★★★★★
</div>


<div class="snes">

SUPER NINTENDO<br>

1990

</div>



<button onclick="jogar()">

🟨 JOGAR AGORA

</button>



<div class="info">

📱 Compatível Android<br>

🍎 Compatível iPhone<br>

🎮 Controles na tela

</div>



</div>



<script>

function jogar(){

alert("🍄 Inserindo cartucho digital...");

}

</script>


</body>

</html>
