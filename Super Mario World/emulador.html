<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Super Mario World - RetroTag NFC</title>


<style>

html, body {

margin:0;
padding:0;

width:100%;
height:100%;

background:#000;

overflow:hidden;

}


#game {

width:100%;
height:100%;

}

</style>


</head>


<body>


<div id="game"></div>



<script>


// Área do emulador

EJS_player = "#game";


// Sistema Super Nintendo

EJS_core = "snes";


// ROM do jogo

EJS_gameUrl = "rom/super-mario-world.smc";


// Arquivos do EmulatorJS

EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";


// Inicia automaticamente

EJS_startOnLoaded = true;


// Tenta abrir tela cheia

EJS_fullscreenOnLoad = true;


</script>



<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>



</body>

</html>
