<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RetroTag NFC - Super Mario World</title>


<style>


html, body {

    margin:0;
    padding:0;

    width:100%;
    height:100%;

    overflow:hidden;

    background:#000;

}



#game {

    width:100%;
    height:100%;

}



/* BOTÃO DE TELA CHEIA */

#fullscreenBtn{


    position:fixed;


    top:15px;

    right:15px;


    z-index:999999;



    padding:12px 18px;


    font-size:16px;


    font-weight:bold;



    border:none;


    border-radius:10px;



    background:#f5b400;


    color:#222;



    box-shadow:

    0 4px 10px rgba(0,0,0,.6);



    cursor:pointer;



}



#fullscreenBtn:active{


    transform:scale(.95);


}



</style>


</head>


<body>



<div id="game"></div>





<script>


// Área do emulador

EJS_player = "#game";


// Sistema

EJS_core = "snes";


// ROM

EJS_gameUrl = "rom/super-mario-world.smc";


// Nome

EJS_gameName = "Super Mario World";


// Arquivos EmulatorJS

EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";


// Inicialização

EJS_startOnLoaded = true;


// Controle virtual celular

EJS_VirtualGamepad = true;


// Volume

EJS_volume = 0.5;



// Melhor desempenho

EJS_disableDatabases = true;

EJS_disableAutoSave = true;

EJS_disableAutoLoad = true;



// Fundo

EJS_color = "#000";



// Não abre sozinho

EJS_fullscreenOnLoad = false;



</script>



<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>





<!-- BOTÃO FICA NO FINAL PARA FICAR ACIMA DO EMULADOR -->

<button id="fullscreenBtn" onclick="abrirTelaCheia()">

⛶ TELA CHEIA

</button>





<script>


function abrirTelaCheia(){


let elemento = document.documentElement;



if(elemento.requestFullscreen){


    elemento.requestFullscreen();


}

else if(elemento.webkitRequestFullscreen){


    elemento.webkitRequestFullscreen();


}

else if(elemento.msRequestFullscreen){


    elemento.msRequestFullscreen();


}



}



</script>



</body>

</html>
