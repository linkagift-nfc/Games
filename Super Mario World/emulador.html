<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>RetroTag NFC - Super Mario World</title>


<style>

html, body {

    margin:0;
    padding:0;

    width:100%;
    height:100%;

    overflow:hidden;

    background:#000;

}


#game {

    width:100%;
    height:100%;

}


</style>


</head>


<body>


<div id="game"></div>



<script>


// Área do emulador

EJS_player = "#game";


// Console

EJS_core = "snes";


// ROM

EJS_gameUrl = "rom/super-mario-world.smc";


// Nome do jogo

EJS_gameName = "Super Mario World";


// Arquivos EmulatorJS

EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";


// Iniciar automaticamente

EJS_startOnLoaded = true;


// Controle virtual celular

EJS_VirtualGamepad = true;


// Volume

EJS_volume = 0.5;


// Desempenho

EJS_disableDatabases = true;

EJS_disableAutoSave = true;

EJS_disableAutoLoad = true;


// Fundo

EJS_color = "#000";


// Tenta abrir tela cheia

EJS_fullscreenOnLoad = true;



</script>



<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>



</body>

</html>
