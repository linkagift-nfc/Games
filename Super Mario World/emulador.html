<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Super Mario World - RetroTag NFC</title>


<style>

html,body{

margin:0;
padding:0;

width:100%;
height:100%;

background:#000;

overflow:hidden;

}


#game{

width:100%;
height:100%;

}


</style>


</head>


<body>


<div id="game"></div>



<script>


// Área do emulador

EJS_player = "#game";


// Console

EJS_core = "snes";


// Jogo

EJS_gameUrl = "rom/super-mario-world.smc";


// Nome

EJS_gameName = "Super Mario World";


// Arquivos EmulatorJS

EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";


// Carrega automaticamente

EJS_startOnLoaded = true;


// Mais leve para celulares

EJS_threads = false;

EJS_gamePatch = false;

EJS_volume = 0.8;


// Controles virtuais

EJS_VirtualGamepad = true;


// Fundo

EJS_color = "#000";


// Não força tela cheia no carregamento

// melhora compatibilidade mobile

EJS_fullscreenOnLoad = false;


</script>



<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>



</body>

</html>
