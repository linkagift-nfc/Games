<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Super Mario World</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
}

#game {
    width: 100%;
    height: 100%;
}
</style>
</head>

<body>

<div id="game"></div>

<script>
EJS_player = "#game";

// Sistema
EJS_core = "snes";

// ROM
EJS_gameUrl = "rom/super-mario-world.smc";

// Nome
EJS_gameName = "Super Mario World";

// EmulatorJS Oficial
EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";

// Configurações
EJS_startOnLoaded = true;
EJS_VirtualGamepad = true;
EJS_volume = 0.5;

// Melhora um pouco o desempenho
EJS_disableDatabases = true;
EJS_disableAutoSave = true;
EJS_disableAutoLoad = true;
</script>

<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

</body>
</html>
