<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>RetroTag NFC - Super Mario World</title>


<style>


html, body {

    margin:0;
    padding:0;

    width:100%;
    height:100%;

    overflow:hidden;

    background:#000;

}



#game {

    width:100%;
    height:100%;

}



/* BOTÃO TELA CHEIA */

#fullscreenBtn{

    position:fixed;

    top:15px;

    right:15px;


    z-index:9999;


    padding:12px 18px;


    font-size:16px;


    font-weight:bold;


    border:none;


    border-radius:10px;


    background:#f5b400;


    color:#222;


    cursor:pointer;


    box-shadow:
    0 4px 8px rgba(0,0,0,.5);

}



#fullscreenBtn:active{

    transform:scale(.95);

}



</style>


</head>


<body>



<div id="game"></div>



<button id="fullscreenBtn" onclick="abrirTelaCheia()">

⛶ TELA CHEIA

</button>





<script>


// Área do emulador

EJS_player = "#game";


// Console

EJS_core = "snes";


// ROM

EJS_gameUrl = "rom/super-mario-world.smc";


// Nome do jogo

EJS_gameName = "Super Mario World";


// Arquivos EmulatorJS

EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";


// Inicia automaticamente

EJS_startOnLoaded = true;


// Controle virtual

EJS_VirtualGamepad = true;


// Volume

EJS_volume = 0.5;



// Desempenho

EJS_disableDatabases = true;

EJS_disableAutoSave = true;

EJS_disableAutoLoad = true;


// Fundo

EJS_color = "#000";


// Não força sozinho (melhor compatibilidade)

EJS_fullscreenOnLoad = false;




// FUNÇÃO TELA CHEIA

function abrirTelaCheia(){


let elem = document.documentElement;



if(elem.requestFullscreen){

    elem.requestFullscreen();

}

else if(elem.webkitRequestFullscreen){

    elem.webkitRequestFullscreen();

}

else if(elem.msRequestFullscreen){

    elem.msRequestFullscreen();

}


}




</script>



<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>



</body>


</html>
