<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Super Mario World - RetroTag NFC</title>

<style>

html,body{

margin:0;
padding:0;

width:100%;
height:100%;

background:#000;

overflow:hidden;

}

#game{

width:100%;
height:100%;

}

</style>

</head>


<body>


<div id="game"></div>


<script>


EJS_player = "#game";


EJS_core = "snes";


EJS_gameUrl = "rom/super-mario-world.smc";


EJS_gameName = "Super Mario World";


EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";


// Configuração mobile

EJS_startOnLoaded = true;

EJS_threads = false;

EJS_disableDatabases = true;

EJS_disableAutoLoad = true;

EJS_disableAutoSave = true;


// reduz consumo

EJS_volume = 0.6;


EJS_VirtualGamepad = true;


EJS_fullscreenOnLoad = false;


</script>


<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>


</body>

</html>
