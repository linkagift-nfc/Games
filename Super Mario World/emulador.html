<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Super Mario World - RetroTag NFC</title>

<style>

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
background:#000;
overflow:hidden;
}

#game{
width:100%;
height:100%;
}

</style>

</head>


<body>

<div id="game"></div>


<script>

EJS_player = "#game";

EJS_core = "snes";

EJS_gameUrl = "rom/super-mario-world.smc";

EJS_gameName = "Super Mario World";

EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";


// desempenho mobile

EJS_startOnLoaded = true;

EJS_VirtualGamepad = true;

EJS_volume = 0.5;


// desativa recursos pesados

EJS_disableAutoSave = true;

EJS_disableAutoLoad = true;


</script>


<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

</body>

</html>
