<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Super Mario World - RetroTag NFC</title>


<style>

html,body{

margin:0;
padding:0;

width:100%;
height:100%;

background:#000;

overflow:hidden;

}


#game{

width:100%;
height:100%;

}

</style>


</head>


<body>


<div id="game"></div>



<script>


// Tela do emulador

EJS_player = "#game";


// Console

EJS_core = "snes";


// ROM

EJS_gameUrl = "rom/super-mario-world.smc";


// Nome do jogo

EJS_gameName = "Super Mario World";


// Agora usa o EmulatorJS do seu GitHub

EJS_pathtodata = "../emulator/data/";


// Inicialização automática

EJS_startOnLoaded = true;


// Controles virtuais

EJS_VirtualGamepad = true;


// Volume

EJS_volume = 0.5;


// Melhor compatibilidade mobile

EJS_disableAutoSave = true;

EJS_disableAutoLoad = true;

EJS_disableDatabases = true;


</script>



<script src="../emulator/data/loader.js"></script>



</body>

</html>
