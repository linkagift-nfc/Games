<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RetroTag NFC</title>


<style>

html,body{

margin:0;
padding:0;

width:100%;
height:100%;

overflow:hidden;

background:#000;

}


#game{

width:100%;
height:100%;

}


/* CAMADA DO BOTÃO */

#menu{

position:fixed;

top:20px;

right:20px;

z-index:999999999;

}



#fullscreenBtn{

background:#f5b400;

color:#222;

border:none;

border-radius:10px;

padding:12px 18px;

font-size:18px;

font-weight:bold;

cursor:pointer;

box-shadow:0 5px 10px #000;

}


</style>


</head>


<body>



<div id="game"></div>



<div id="menu">

<button id="fullscreenBtn" onclick="abrirTelaCheia()">

⛶ TELA CHEIA

</button>

</div>





<script>


EJS_player = "#game";


EJS_core = "snes";


EJS_gameUrl = "rom/super-mario-world.smc";


EJS_gameName = "Super Mario World";


EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";



EJS_startOnLoaded = true;


EJS_VirtualGamepad = true;


EJS_volume = 0.5;


EJS_disableDatabases = true;

EJS_disableAutoSave = true;

EJS_disableAutoLoad = true;


EJS_color = "#000";


</script>



<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>




<script>


function abrirTelaCheia(){


let tela = document.documentElement;


if(tela.requestFullscreen){

tela.requestFullscreen();

}

else if(tela.webkitRequestFullscreen){

tela.webkitRequestFullscreen();

}

else if(tela.msRequestFullscreen){

tela.msRequestFullscreen();

}


}



</script>



</body>

</html>
