<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#000000">

<title>RetroTag NFC</title>


<style>

html,body{

margin:0;
padding:0;

width:100%;
height:100%;

overflow:hidden;

background:#000;

}


#game{

width:100%;
height:100%;

}


#menu{

position:fixed;

top:12px;
left:12px;

z-index:9999999;

}


#fullscreenBtn{

background:#f5b400;

color:#222;

border:none;

border-radius:8px;

width:40px;

height:34px;

font-size:18px;

font-weight:bold;

cursor:pointer;

box-shadow:
0 3px 6px rgba(0,0,0,.7);

opacity:.9;

}



#fullscreenBtn:active{

transform:scale(.92);

}


</style>

</head>


<body>


<div id="game"></div>


<div id="menu">

<button id="fullscreenBtn" onclick="abrirTelaCheia()">

⛶

</button>

</div>




<script>


//================================
// CONFIGURAÇÃO PELA URL
//================================


const url = new URLSearchParams(
window.location.search
);



// área do emulador

EJS_player = "#game";



// console

EJS_core =

url.get("core") || "snes";




// nome do jogo

EJS_gameName =

url.get("nome") || "RetroTag NFC";




// ROM

let romArquivo =

decodeURIComponent(
url.get("rom")
);



EJS_gameUrl =

window.location.origin
+
"/Games/"
+
romArquivo;




// pasta EmulatorJS

EJS_pathtodata = "data/";




//================================
// AJUSTES
//================================


EJS_startOnLoaded = true;


EJS_VirtualGamepad = true;


EJS_volume = 0.5;


EJS_disableDatabases = true;


EJS_disableAutoSave = true;


EJS_disableAutoLoad = true;


EJS_threads = false;


EJS_cacheLimit = 512;


EJS_color = "#000";



</script>




<script src="data/loader.js"></script>




<script>


function abrirTelaCheia(){


if(!document.fullscreenElement){


let tela = document.documentElement;



if(tela.requestFullscreen){

tela.requestFullscreen();

}

else if(tela.webkitRequestFullscreen){

tela.webkitRequestFullscreen();

}

else if(tela.msRequestFullscreen){

tela.msRequestFullscreen();

}



}else{



if(document.exitFullscreen){

document.exitFullscreen();

}

else if(document.webkitExitFullscreen){

document.webkitExitFullscreen();

}

else if(document.msExitFullscreen){

document.msExitFullscreen();

}



}



}


</script>



</body>

</html>
