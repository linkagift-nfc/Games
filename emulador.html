<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RetroTag NFC</title>

<style>

html,body{

margin:0;
padding:0;

width:100%;
height:100%;

overflow:hidden;

background:#000;

}

#game{

width:100%;
height:100%;

}

</style>

</head>


<body>


<div id="game"></div>



<script>


const url = new URLSearchParams(
window.location.search
);



EJS_player = "#game";


EJS_core =

url.get("core") || "snes";



EJS_gameName =

decodeURIComponent(
url.get("nome") || "RetroTag NFC"
);



EJS_gameUrl =

decodeURIComponent(
url.get("rom")
);



EJS_pathtodata =

"https://cdn.emulatorjs.org/stable/data/";



// configurações

EJS_startOnLoaded = true;

EJS_VirtualGamepad = true;

EJS_volume = 0.6;

EJS_disableDatabases = true;

EJS_disableAutoSave = true;

EJS_disableAutoLoad = true;

EJS_threads = false;

EJS_cacheLimit = 256;



</script>



<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>



<script>


function ativarModoJogo(){


let tela = document.documentElement;


// fullscreen

if(tela.requestFullscreen){

tela.requestFullscreen()
.catch(()=>{});

}


// orientação

if(screen.orientation){

screen.orientation.lock("landscape")
.catch(()=>{});

}


}




// tenta quando a página abre

window.onload=function(){


setTimeout(function(){


ativarModoJogo();


},1500);



};



// tenta novamente quando o emulador termina

window.addEventListener(
"load",
function(){


setTimeout(function(){


ativarModoJogo();


},5000);


});


</script>



</body>

</html>
