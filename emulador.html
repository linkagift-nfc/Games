<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RetroTag NFC</title>

<style>

html,body{

margin:0;
padding:0;

width:100%;
height:100%;

overflow:hidden;

background:#000;

}


#game{

width:100%;
height:100%;

}


#menu{

position:fixed;

top:12px;
left:12px;

z-index:999999;

}


#fullscreenBtn{

background:#f5b400;

color:#222;

border:none;

border-radius:8px;

width:40px;

height:34px;

font-size:18px;

font-weight:bold;

cursor:pointer;

}


</style>

</head>


<body>


<div id="game"></div>


<div id="menu">

<button id="fullscreenBtn" onclick="abrirTelaCheia()">

⛶

</button>

</div>



<script>


const url = new URLSearchParams(
window.location.search
);



EJS_player = "#game";


EJS_core =

url.get("core") || "snes";



EJS_gameName =

decodeURIComponent(
url.get("nome") || "RetroTag NFC"
);



EJS_gameUrl =

decodeURIComponent(
url.get("rom")
);



// IGUAL AO MARIO

EJS_pathtodata =

"https://cdn.emulatorjs.org/stable/data/";



EJS_startOnLoaded = true;


EJS_VirtualGamepad = true;


EJS_volume = 0.5;


EJS_disableDatabases = true;


EJS_disableAutoSave = true;


EJS_disableAutoLoad = true;


EJS_threads = false;


EJS_color = "#000";



</script>



<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>




<script>


function abrirTelaCheia(){


if(!document.fullscreenElement){


document.documentElement.requestFullscreen();


}else{


document.exitFullscreen();


}


}


</script>



</body>

</html>
