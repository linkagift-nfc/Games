<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RetroTag NFC</title>

<style>

html,body{

margin:0;
padding:0;

width:100%;
height:100%;

overflow:hidden;

background:#000;

font-family:Arial,sans-serif;

}


#game{

width:100%;
height:100%;

}



#boot{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:#000;

color:white;

display:flex;

align-items:center;

justify-content:center;

text-align:center;

z-index:999999;

}



.logo{

font-size:32px;

font-weight:bold;

color:#f5b400;

margin-bottom:30px;

}



.texto{

font-size:22px;

line-height:1.8;

}



.botao{

margin-top:30px;

padding:18px 45px;

font-size:22px;

font-weight:bold;

border:none;

border-radius:12px;

background:#f5b400;

color:#222;

box-shadow:0 6px 0 #a56d00;

}



.botao:active{

transform:translateY(6px);

box-shadow:none;

}



</style>

</head>


<body>



<div id="game"></div>



<div id="boot">


<div>


<div class="logo">

🎮 RETROTAG NFC

</div>


<div class="texto">

📦 CARTUCHO DETECTADO

<br>

🔌 PRONTO PARA INICIAR

</div>


<button class="botao" onclick="iniciarJogo()">

▶ INICIAR

</button>


</div>


</div>





<script>


const url = new URLSearchParams(
window.location.search
);



let iniciado=false;



function iniciarJogo(){


if(iniciado) return;

iniciado=true;



// tela cheia

if(document.documentElement.requestFullscreen){

document.documentElement.requestFullscreen()
.catch(()=>{});

}



// horizontal

if(screen.orientation){

screen.orientation.lock("landscape")
.catch(()=>{});

}



// remove tela

document.getElementById("boot").style.display="none";



// configura emulator


window.EJS_player="#game";


window.EJS_core=

url.get("core") || "snes";



window.EJS_gameName=

decodeURIComponent(
url.get("nome") || "RetroTag NFC"
);



window.EJS_gameUrl=

decodeURIComponent(
url.get("rom")
);



window.EJS_pathtodata=

"https://cdn.emulatorjs.org/stable/data/";



window.EJS_startOnLoaded=true;


window.EJS_VirtualGamepad=true;


window.EJS_volume=0.6;


window.EJS_disableDatabases=true;


window.EJS_disableAutoSave=true;


window.EJS_disableAutoLoad=true;


window.EJS_threads=false;


window.EJS_cacheLimit=256;



// carrega o EmulatorJS somente agora

let script=document.createElement("script");

script.src="https://cdn.emulatorjs.org/stable/data/loader.js";

document.body.appendChild(script);



}



</script>


</body>

</html>
