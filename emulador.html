<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RetroTag NFC</title>

<style>

html,body{

margin:0;
padding:0;

width:100%;
height:100%;

overflow:hidden;

background:#000;

font-family:Arial,sans-serif;

}


#game{

width:100%;
height:100%;

}


/* TELA DE BOOT */

#boot{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:#000;

color:white;

display:flex;

align-items:center;

justify-content:center;

text-align:center;

z-index:999999;

}


.boot-box{

animation:pulse 1.5s infinite;

}


.logo{

font-size:32px;

font-weight:bold;

color:#f5b400;

margin-bottom:30px;

}


.texto{

font-size:22px;

line-height:1.8;

}



.botao{

margin-top:30px;

padding:18px 45px;

font-size:22px;

font-weight:bold;

border:none;

border-radius:12px;

background:#f5b400;

color:#222;

box-shadow:0 6px 0 #a56d00;

}


.botao:active{

transform:translateY(6px);

box-shadow:none;

}



@keyframes pulse{

50%{

opacity:.5;

}

}


</style>


</head>


<body>


<div id="game"></div>



<div id="boot">


<div class="boot-box">


<div class="logo">

🎮 RETROTAG NFC

</div>


<div class="texto">


📦 CARTUCHO DETECTADO

<br>

🔌 INSERINDO JOGO


</div>



<button class="botao" onclick="iniciarJogo()">

▶ INICIAR

</button>



</div>


</div>




<script>


const url = new URLSearchParams(
window.location.search
);



EJS_player="#game";


EJS_core =

url.get("core") || "snes";



EJS_gameName =

decodeURIComponent(
url.get("nome") || "RetroTag NFC"
);



EJS_gameUrl =

decodeURIComponent(
url.get("rom")
);



EJS_pathtodata =

"https://cdn.emulatorjs.org/stable/data/";




// desempenho

EJS_startOnLoaded=true;


EJS_VirtualGamepad=true;


EJS_volume=0.6;


EJS_disableDatabases=true;


EJS_disableAutoSave=true;


EJS_disableAutoLoad=true;


EJS_threads=false;


EJS_cacheLimit=256;



</script>




<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>




<script>


function iniciarJogo(){



// remove tela inicial

document.getElementById("boot").style.display="none";



// tenta tela cheia

if(document.documentElement.requestFullscreen){

document.documentElement.requestFullscreen()
.catch(()=>{});

}



// tenta girar horizontal

if(screen.orientation){

screen.orientation.lock("landscape")
.catch(()=>{});

}



}



</script>




</body>

</html>
